version: '3.8'

services:
  app:
    build: .
    container_name: simple_lms
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./code:/app
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      mongodb:
        condition: service_started
    networks:
      - lms-network

  database:
    image: postgres:15-alpine
    container_name: lms_database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lms-network

  redis:
    image: redis:7-alpine
    container_name: lms_redis
    volumes:
      - redis_data:/data
    networks:
      - lms-network

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo_data:/data/db
    networks:
      - lms-network

volumes:
  postgres_data:
  redis_data:
  mongo_data:

networks:
  lms-network:
    driver: bridge